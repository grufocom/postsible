# playbooks/site.yml
---
- name: Postsible Mailserver - Complete Installation
  hosts: mailservers
  become: yes
  pre_tasks:
    - name: Display deployment information
      debug:
        msg:
          - "==================================================="
          - "Postsible Mailserver Deployment"
          - "==================================================="
          - "Target Host: {{ inventory_hostname }}"
          - "Hostname: {{ common_hostname | default(ansible_hostname) }}"
          - "Primary Domain: {{ mail_primary_domain }}"
          - "Virtual Domains: {{ mail_virtual_domains | map(attribute='domain') | join(', ') }}"
          - "Deployment Date: {{ ansible_date_time.iso8601 }}"
          - "==================================================="
      tags: always

    - name: Check if Debian 13
      assert:
        that:
          - ansible_distribution == "Debian"
          - ansible_distribution_major_version|int >= 13
        fail_msg: "This playbook requires Debian 13 or higher"
        success_msg: "Debian version check passed"
      tags: always

    - name: Gather package facts
      package_facts:
        manager: auto
      tags: always

  roles:
    # Phase 1: Basic-infrastructure
    - role: common
      tags:
        - common
        - phase1

    - role: ufw
      tags:
        - ufw
        - firewall
        - phase1

    - role: mariadb
      tags:
        - mariadb
        - database
        - phase1

    # Phase 2: Mail-Core
    - role: postfix
      tags:
        - postfix
        - mail
        - phase2

    - role: dovecot
      tags:
        - dovecot
        - mail
        - phase2

    # Phase 3: Spam & Antivirus
    - role: rspamd
      tags:
        - rspamd
        - spam
        - phase3

    - role: eset_icap
      tags:
        - eset
        - antivirus
        - phase3
      when: eset_icap_enabled | default(false)

    # Phase 4: Web & SSL
    - role: certbot
      tags:
        - certbot
        - ssl
        - phase4

    - role: nginx
      tags:
        - nginx
        - web
        - phase4

    - role: snappymail
      tags:
        - snappymail
        - webmail
        - phase4

    - role: baikal
      tags:
        - baikal
        - caldav
        - phase4

    - role: infcloud
      tags:
        - infcloud
        - phase4

    - role: autoconfig
      tags:
        - autoconfig
        - phase4

    # Phase 5: Security
    - role: fail2ban
      tags:
        - fail2ban
        - security
        - phase5

    # Phase 6: User Features
    - role: vacation
      tags:
        - vacation
        - phase6

    - role: signature
      tags:
        - signature
        - phase6

  post_tasks:
    - name: Ensure postsible directory exists
      file:
        path: /etc/postsible
        state: directory
        mode: '0755'
      tags: always

    # ── Admin user: one per domain ────────────────────────────────────────────

    - name: Check if admin user exists per domain
      shell: |
        if [ ! -f /root/admin-credentials-{{ item.domain }}.txt ]; then
          echo "0"
        else
          mysql -u root -p'{{ mariadb_root_password }}' {{ mariadb_database }} -sN \
            -e "SELECT COUNT(*) FROM virtual_users WHERE email='{{ item.admin_email }}';"
        fi
      register: admin_user_check
      changed_when: false
      no_log: true
      loop: "{{ mail_virtual_domains }}"
      loop_control:
        label: "{{ item.admin_email }}"
      tags: always

    - name: Create admin user per domain (if not exists)
      shell: |
        /usr/local/bin/maildb-manage add-user {{ item.item.admin_email }} \
          --auto-password --displayname "Administrator" --quiet
      register: admin_password_results
      when: item.stdout == "0"
      loop: "{{ admin_user_check.results }}"
      loop_control:
        label: "{{ item.item.admin_email }}"
      tags: always

    - name: Save admin credentials per domain
      copy:
        content: |
          Postsible Admin User Credentials
          ================================
          Domain:   {{ item.item.item.domain }}
          Email:    {{ item.item.item.admin_email }}
          Password: {{ item.stdout }}

          Created: {{ ansible_date_time.iso8601 }}

          IMPORTANT: Save this password securely and delete this file!

          Access (this domain):
          - Webmail:          https://{{ item.item.item.mx_hostname }}/wm/
          - Vacation Manager: https://{{ item.item.item.mx_hostname }}/vacation/
          - Signature Manager:https://{{ item.item.item.mx_hostname }}/signature/
          - Rspamd WebUI:     https://{{ item.item.item.mx_hostname }}/rspamd/
          - CalDAV/CardDAV:   https://{{ item.item.item.mx_hostname }}/dav/
          - InfCloud:         https://{{ item.item.item.mx_hostname }}/cal/
          - IMAP:             {{ item.item.item.mx_hostname }}:993 (SSL/TLS)
          - SMTP:             {{ item.item.item.mx_hostname }}:587 (STARTTLS)
        dest: "/root/admin-credentials-{{ item.item.item.domain }}.txt"
        mode: '0600'
      when: item.changed
      loop: "{{ admin_password_results.results }}"
      loop_control:
        label: "{{ item.item.item.admin_email }}"
      tags: always

    # ── Restart services ──────────────────────────────────────────────────────

    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: always

    - name: Restart all mail and web services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - mariadb
        - postfix
        - dovecot
        - nginx
        - fail2ban
        - php8.4-fpm
      when: ansible_facts.services is defined and (item + '.service') in ansible_facts.services
      tags: always

    # ── Welcome email per domain ──────────────────────────────────────────────

    - name: Create welcome email per domain
      copy:
        content: |
          From: Postsible Mailserver <postmaster@{{ item.domain }}>
          To: {{ item.admin_email }}
          Subject: Welcome to your Postsible Mailserver! 🎉
          Date: {{ ansible_date_time.iso8601 }}
          MIME-Version: 1.0
          Content-Type: text/plain; charset=UTF-8

          ========================================
          Welcome to your Postsible Mailserver!
          ========================================

          Dear Administrator,

          your mailserver has been successfully deployed for domain {{ item.domain }}.

          📍 Access Information
          ----------------------
          Webmail:           https://{{ item.mx_hostname }}/wm/
          Vacation Manager:  https://{{ item.mx_hostname }}/vacation/
          Signature Manager: https://{{ item.mx_hostname }}/signature/
          Rspamd WebUI:      https://{{ item.mx_hostname }}/rspamd/
          InfCloud:          https://{{ item.mx_hostname }}/cal/
          IMAP:              {{ item.mx_hostname }}:993 (SSL/TLS)
          SMTP:              {{ item.mx_hostname }}:587 (STARTTLS)

          📅 Calendar Integration (CalDAV)
          ---------------------------------
          URL: https://{{ item.mx_hostname }}/dav/dav.php/calendars/{{ item.admin_email }}/default/
          Username: {{ item.admin_email }}

          👥 Contacts Integration (CardDAV)
          ----------------------------------
          URL: https://{{ item.mx_hostname }}/dav/dav.php/addressbooks/{{ item.admin_email }}/default/
          Username: {{ item.admin_email }}

          📱 Mobile Setup (iOS/Android)
          ------------------------------
          iOS/macOS: Settings → Accounts → Other → CalDAV/CardDAV
          Android (DAVx⁵): Base URL: https://{{ item.mx_hostname }}/dav/dav.php/

          🔧 Management Commands
          -----------------------
          Add user:         maildb-manage add-user user@{{ item.domain }}
          List users:       maildb-manage list-users {{ item.domain }}
          Change password:  maildb-manage change-password user@{{ item.domain }}
          Set vacation:     maildb-manage set-vacation user@{{ item.domain }} \
                              --from YYYY-MM-DD --to YYYY-MM-DD \
                              --subject "..." --message "..."

          📚 Documentation
          -----------------
          - Admin credentials: /root/admin-credentials-{{ item.domain }}.txt
          - DKIM DNS records:  /root/dkim-dns-records.txt
          - Deployment summary: /etc/postsible/deployment_summary.txt

          ========================================
          Thank you for using Postsible!
          ========================================
        dest: "/tmp/welcome_email_{{ item.domain }}.txt"
        mode: '0600'
      loop: "{{ mail_virtual_domains }}"
      loop_control:
        label: "{{ item.domain }}"
      tags: [welcome_email, always]

    - name: Send welcome email per domain
      shell: |
        sendmail {{ item.admin_email }} < /tmp/welcome_email_{{ item.domain }}.txt
      args:
        executable: /bin/bash
      register: welcome_email_results
      changed_when: false
      failed_when: false
      loop: "{{ mail_virtual_domains }}"
      loop_control:
        label: "{{ item.admin_email }}"
      tags: [welcome_email, always]

    # ── DNS summary ───────────────────────────────────────────────────────────

    - name: Display summary of DNS issues
      ansible.builtin.debug:
        msg: |
          ===========================================
          AUTOCONFIG DNS STATUS
          ===========================================
          {% if autoconfig_missing_dns is defined and autoconfig_missing_dns | length > 0 %}
          ⚠️  MISSING DNS RECORDS:
          {% for record in autoconfig_missing_records %}
            - {{ record }}
          {% endfor %}

          ACTION REQUIRED: Add these DNS records for email client auto-configuration.
          Re-run after DNS is set:
            ansible-playbook playbooks/site.yml --tags certbot --ask-vault-pass
          {% else %}
          ✓ All autoconfig DNS records are correctly configured.
          {% endif %}
          ===========================================
      when:
        - not autoconfig_skip_dns_check | default(false)
        - autoconfig_missing_dns is defined
      tags: always

    # ── Completion summary ────────────────────────────────────────────────────

    - name: Display admin credentials summary
      debug:
        msg: |
          ===================================================
          Admin Users Created:
          ===================================================
          {% for r in admin_password_results.results %}
          {% if r.changed %}
            {{ r.item.item.admin_email }}
            -> /root/admin-credentials-{{ r.item.item.domain }}.txt
          {% endif %}
          {% endfor %}
          Please save all passwords securely and delete the files!
          ===================================================
      tags: always

    - name: Display completion information
      debug:
        msg: |
          ===================================================
          Postsible Mailserver Deployment Complete!
          ===================================================
          Domains configured: {{ mail_virtual_domains | length }}

          {% for d in mail_virtual_domains %}
          Domain: {{ d.domain }}
            Webmail:   https://{{ d.mx_hostname }}/wm/
            Vacation:  https://{{ d.mx_hostname }}/vacation/
            Signature: https://{{ d.mx_hostname }}/signature/
            Rspamd:    https://{{ d.mx_hostname }}/rspamd/
            IMAP:      {{ d.mx_hostname }}:993
            SMTP:      {{ d.mx_hostname }}:587
          {% endfor %}
          ===================================================
          Next Steps:
          1. Add DKIM DNS records from /root/dkim-dns-records.txt
          2. Save admin passwords from /root/admin-credentials-*.txt
          3. Test email sending/receiving
          4. Check cert status: ls /var/lib/postsible/certs/
          ===================================================
      tags: always

    - name: Create deployment summary file
      copy:
        content: |
          Postsible Mailserver Deployment Summary
          ========================================
          Deployment Date: {{ ansible_date_time.iso8601 }}
          Primary Domain:  {{ mail_primary_domain }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}

          Domains configured:
          {% for d in mail_virtual_domains %}
            - {{ d.domain }}
                MX Hostname:  {{ d.mx_hostname }}
                Admin Email:  {{ d.admin_email }}
                Webmail:      https://{{ d.mx_hostname }}/wm/
                Vacation:     https://{{ d.mx_hostname }}/vacation/
                Signature:    https://{{ d.mx_hostname }}/signature/
                Rspamd:       https://{{ d.mx_hostname }}/rspamd/
                CalDAV:       https://{{ d.mx_hostname }}/dav/
                InfCloud:     https://{{ d.mx_hostname }}/cal/
                IMAP:         {{ d.mx_hostname }}:993 (SSL/TLS)
                SMTP:         {{ d.mx_hostname }}:587 (STARTTLS)
          {% endfor %}

          Services Installed:
          - Postfix (SMTP)
          - Dovecot (IMAP/LMTP/Sieve)
          - Rspamd (Spam Filter + DKIM per domain)
          - SnappyMail (Webmail – all domains)
          - Baikal (CalDAV/CardDAV)
          - InfCloud (Web Calendar/Contacts)
          - Nginx (per-domain vhosts)
          - MariaDB (Database)
          - Certbot (Let's Encrypt per hostname)
          - UFW (Firewall)
          - Fail2ban (Intrusion Prevention)
          - Vacation Manager (all domains)
          - Signature Manager (all domains)
          {% if eset_icap_enabled %}
          - ESET ICAP (Antivirus)
          {% endif %}

          SSL Certificate Status:
          (see /var/lib/postsible/certs/ for *.ok / *.pending markers)

          Database:
          - Name: {{ mariadb_database }}
          - User: {{ mariadb_user }}
          - Host: {{ mariadb_host }}

          Important Files:
          - Maildir:           /srv/imap/
          - Logs:              /var/log/mail/
          - Config:            /etc/postsible/
          - Admin credentials: /root/admin-credentials-<domain>.txt
          - DKIM records:      /root/dkim-dns-records.txt
          - Cert markers:      /var/lib/postsible/certs/

          User Management:
            maildb-manage add-user user@example.com --auto-password
            maildb-manage list-users
            maildb-manage change-password user@example.com
            maildb-manage set-vacation user@example.com --from YYYY-MM-DD --to YYYY-MM-DD --subject "..." --message "..."
            maildb-manage disable-vacation user@example.com
            maildb-manage help
        dest: /etc/postsible/deployment_summary.txt
        mode: '0644'
      tags: always
