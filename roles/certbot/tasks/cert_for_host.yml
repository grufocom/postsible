---
# roles/certbot/tasks/cert_for_host.yml
# Strategy:
#   1. ALWAYS ensure a certificate exists first (self-signed if needed)
#      so nginx can start regardless of DNS state
#   2. Then attempt Let's Encrypt via webroot (not --nginx plugin)
#      webroot works independently of nginx running state
#   3. Replace self-signed with LE cert when DNS is correct

- name: "[{{ vdomain.mx_hostname }}] Check DNS resolution"
  ansible.builtin.command: "dig +short {{ vdomain.mx_hostname }} A"
  register: _dns_result
  changed_when: false
  failed_when: false
  check_mode: false
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Evaluate DNS"
  ansible.builtin.set_fact:
    _dns_ok: "{{ _dns_result.stdout | trim == certbot_server_ip | trim }}"
    _cert_dir: "{{ certbot_cert_path }}/{{ vdomain.mx_hostname }}"
    _marker_ok: "{{ certbot_pending_dir }}/{{ vdomain.mx_hostname }}.ok"
    _marker_pending: "{{ certbot_pending_dir }}/{{ vdomain.mx_hostname }}.pending"
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] DNS status"
  ansible.builtin.debug:
    msg: >-
      {{ vdomain.mx_hostname }} resolves to
      '{{ _dns_result.stdout | default('(nothing)') | trim }}'
      - server is {{ certbot_server_ip }}
      - match: {{ _dns_ok }}
  tags: certbot

# ── Step 1: Check existing state ──────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Check existing certificate on disk"
  ansible.builtin.stat:
    path: "{{ _cert_dir }}/fullchain.pem"
  register: _cert_exists
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Check if renewal config exists (= real LE cert)"
  ansible.builtin.stat:
    path: "/etc/letsencrypt/renewal/{{ vdomain.mx_hostname }}.conf"
  register: _renewal_conf_exists
  tags: certbot

# ── Step 2: ALWAYS ensure a cert exists (self-signed fallback) ────────────────
# This guarantees nginx can always start, even before DNS is set.
# We only generate self-signed if NO cert exists at all yet.

- name: "[{{ vdomain.mx_hostname }}] Ensure cert directory exists"
  ansible.builtin.file:
    path: "{{ _cert_dir }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: '0750'
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Generate self-signed certificate (bootstrap)"
  ansible.builtin.command: >
    {{ certbot_selfsigned_script }} {{ vdomain.mx_hostname }}
  args:
    creates: "{{ _cert_dir }}/fullchain.pem"
  tags: certbot

# ── Step 3: DNS OK → remove self-signed and get real LE cert ─────────────────
# Only remove self-signed (no renewal config) when DNS is now correct.
# Then use --webroot (not --nginx) to avoid chicken-and-egg with nginx.

- name: "[{{ vdomain.mx_hostname }}] Remove self-signed dir before LE (DNS now OK)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ _cert_dir }}"
    - "/etc/letsencrypt/archive/{{ vdomain.mx_hostname }}"
  when:
    - _dns_ok | bool
    - not certbot_skip | default(false)
    - not _renewal_conf_exists.stat.exists | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Obtain Let's Encrypt certificate (webroot)"
  ansible.builtin.command: >
    certbot certonly
    --webroot
    --webroot-path {{ certbot_webroot }}
    --non-interactive
    --agree-tos
    --email {{ vdomain.admin_email }}
    --domain {{ vdomain.mx_hostname }}
    --rsa-key-size {{ certbot_rsa_key_size }}
    {{ '--staging' if certbot_staging else '' }}
    {{ '--force-renewal' if certbot_force_renewal else '' }}
  register: _le_result
  when:
    - _dns_ok | bool
    - not certbot_skip | default(false)
    - not _renewal_conf_exists.stat.exists | bool or certbot_force_renewal | default(false)
  failed_when: false
  tags: certbot

# ── Step 4: Re-check final state ──────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Re-check certificate after LE attempt"
  ansible.builtin.stat:
    path: "{{ _cert_dir }}/fullchain.pem"
  register: _cert_after_le
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Re-check renewal config after LE attempt"
  ansible.builtin.stat:
    path: "/etc/letsencrypt/renewal/{{ vdomain.mx_hostname }}.conf"
  register: _renewal_after_le
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Determine final certificate state"
  ansible.builtin.set_fact:
    _le_active: >-
      {{
        (_dns_ok | bool) and
        (_cert_after_le.stat.exists | bool) and
        (_renewal_after_le.stat.exists | bool) and
        not (certbot_skip | default(false))
      }}
    _need_selfsigned: >-
      {{
        (not (_dns_ok | bool)) or
        (certbot_skip | default(false))
      }}
  tags: certbot

# ── Step 5: Markers ───────────────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Mark as LE-active"
  ansible.builtin.file:
    path: "{{ _marker_ok }}"
    state: touch
    mode: '0644'
  when: _le_active | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Remove pending marker (LE active)"
  ansible.builtin.file:
    path: "{{ _marker_pending }}"
    state: absent
  when: _le_active | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Mark as pending (self-signed active)"
  ansible.builtin.copy:
    dest: "{{ _marker_pending }}"
    content: |
      hostname: {{ vdomain.mx_hostname }}
      dns_resolved: {{ _dns_result.stdout | default('(nothing)') | trim }}
      server_ip: {{ certbot_server_ip }}
      timestamp: {{ ansible_date_time.iso8601 }}
      action: Add DNS A record for {{ vdomain.mx_hostname }} to {{ certbot_server_ip }}
               then re-run: ansible-playbook playbooks/site.yml --tags certbot
    mode: '0644'
  when: _need_selfsigned | bool
  tags: certbot

# ── Step 6: Fix permissions ───────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Fix certificate permissions"
  ansible.builtin.file:
    path: "{{ _cert_dir }}/{{ item }}"
    owner: root
    group: ssl-cert
    mode: '0640'
  loop:
    - fullchain.pem
    - privkey.pem
  failed_when: false
  tags: certbot

# ── Step 7: Reload nginx to pick up new LE cert ───────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Reload nginx after LE cert obtained"
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when:
    - _le_active | bool
    - _le_result is defined
    - _le_result.changed | default(false)
  failed_when: false
  tags: certbot

# ── Summary ───────────────────────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Certificate result"
  ansible.builtin.debug:
    msg: >-
      {{ vdomain.mx_hostname }}:
      dns_ok={{ _dns_ok }},
      le_active={{ _le_active }},
      self_signed_active={{ _need_selfsigned }},
      renewal_conf={{ _renewal_after_le.stat.exists }}
  tags: certbot
