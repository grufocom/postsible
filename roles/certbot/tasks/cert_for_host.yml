---
# roles/certbot/tasks/cert_for_host.yml
#
# Strategy:
#   1. Always ensure a cert exists (self-signed fallback) → nginx can always start
#   2. Check DNS for mx_hostname AND each extra subdomain prefix individually
#   3. If mx_hostname DNS is correct AND no renewal config yet (or force renewal):
#      → Run certbot --standalone (nginx already stopped in main.yml before loop)
#   4. SANs include only subdomains whose DNS also resolves to this server
#   5. nginx stop/start is handled in main.yml around the entire domain loop,
#      not per-host, to avoid start/stop thrashing

# ── Step 1: DNS checks ────────────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Check DNS for mx_hostname"
  ansible.builtin.command: "dig +short {{ vdomain.mx_hostname }} A"
  register: _dns_mx
  changed_when: false
  failed_when: false
  check_mode: false
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Set base domain"
  ansible.builtin.set_fact:
    _base_domain: "{{ vdomain.domain }}"
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Check DNS for each extra subdomain"
  ansible.builtin.command: "dig +short {{ item }}.{{ _base_domain }} A"
  register: _dns_extra_results
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ certbot_extra_subdomain_prefixes }}"
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Evaluate DNS results"
  ansible.builtin.set_fact:
    _dns_ok: "{{ _dns_mx.stdout | trim == certbot_server_ip | trim }}"
    _cert_dir: "{{ certbot_cert_path }}/{{ vdomain.mx_hostname }}"
    _marker_ok: "{{ certbot_pending_dir }}/{{ vdomain.mx_hostname }}.ok"
    _marker_pending: "{{ certbot_pending_dir }}/{{ vdomain.mx_hostname }}.pending"
    _extra_sans: >-
      {{
        _dns_extra_results.results
        | selectattr('stdout', 'defined')
        | selectattr('stdout', 'equalto', certbot_server_ip | trim)
        | map(attribute='item')
        | map('regex_replace', '^(.*)$', '\1.' + vdomain.domain)
        | list
      }}
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Show DNS evaluation"
  ansible.builtin.debug:
    msg: >-
      {{ vdomain.mx_hostname }}:
      dns_ok={{ _dns_ok }},
      server_ip={{ certbot_server_ip }},
      resolved={{ _dns_mx.stdout | default('(nothing)') | trim }},
      extra_sans={{ _extra_sans }}
  tags: certbot

# ── Step 2: Always ensure cert directory and self-signed fallback ─────────────

- name: "[{{ vdomain.mx_hostname }}] Ensure cert directory exists"
  ansible.builtin.file:
    path: "{{ _cert_dir }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: '0750'
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Generate self-signed cert (only if none exists)"
  ansible.builtin.command: >
    {{ certbot_selfsigned_script }} {{ vdomain.mx_hostname }}
  args:
    creates: "{{ _cert_dir }}/fullchain.pem"
  tags: certbot

# ── Step 3: Check existing LE state ──────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Check existing renewal config"
  ansible.builtin.stat:
    path: "/etc/letsencrypt/renewal/{{ vdomain.mx_hostname }}.conf"
  register: _renewal_conf
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Determine if LE issuance is needed"
  ansible.builtin.set_fact:
    _needs_le: >-
      {{
        (_dns_ok | bool) and
        not (certbot_skip | default(false)) and
        (not _renewal_conf.stat.exists | bool or certbot_force_renewal | default(false))
      }}
  tags: certbot

# ── Step 4: Obtain LE cert via standalone ────────────────────────────────────
# nginx was stopped in main.yml before this loop. certbot binds port 80 itself.

- name: "[{{ vdomain.mx_hostname }}] Build certbot domain list (mx + valid SANs)"
  ansible.builtin.set_fact:
    _certbot_domains: >-
      {{ ([vdomain.mx_hostname] + _extra_sans) | join(' --domain ') }}
  when: _needs_le | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Remove self-signed cert before LE issuance"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ _cert_dir }}"
    - "/etc/letsencrypt/archive/{{ vdomain.mx_hostname }}"
  when: _needs_le | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Obtain LE cert via standalone"
  ansible.builtin.command: >
    certbot certonly
    --standalone
    --non-interactive
    --agree-tos
    --email {{ vdomain.admin_email }}
    --domain {{ _certbot_domains }}
    --rsa-key-size {{ certbot_rsa_key_size }}
    {{ '--staging' if certbot_staging else '' }}
    {{ '--force-renewal' if certbot_force_renewal else '' }}
  register: _le_result
  when: _needs_le | bool
  failed_when: false
  changed_when: _le_result.rc | default(1) == 0
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Show LE result"
  ansible.builtin.debug:
    msg: >-
      certbot rc={{ _le_result.rc | default('skipped') }}
      {{ _le_result.stdout | default('') }}
      {{ _le_result.stderr | default('') }}
  when: _needs_le | bool
  tags: certbot

# ── Step 5: Re-check final cert state ────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Re-check fullchain.pem"
  ansible.builtin.stat:
    path: "{{ _cert_dir }}/fullchain.pem"
  register: _cert_after
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Re-check renewal config"
  ansible.builtin.stat:
    path: "/etc/letsencrypt/renewal/{{ vdomain.mx_hostname }}.conf"
  register: _renewal_after
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Determine final certificate state"
  ansible.builtin.set_fact:
    _le_active: >-
      {{
        (_dns_ok | bool) and
        (_cert_after.stat.exists | bool) and
        (_renewal_after.stat.exists | bool) and
        not (certbot_skip | default(false))
      }}
    _need_selfsigned: >-
      {{
        not (_dns_ok | bool) or (certbot_skip | default(false))
      }}
  tags: certbot

# ── Step 6: Fix permissions ───────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Fix cert directory permissions"
  ansible.builtin.file:
    path: "{{ _cert_dir }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: '0750'
  failed_when: false
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Fix cert file permissions"
  ansible.builtin.file:
    path: "{{ _cert_dir }}/{{ item.name }}"
    owner: root
    group: ssl-cert
    mode: "{{ item.mode }}"
  loop:
    - { name: fullchain.pem, mode: '0644' }
    - { name: privkey.pem,   mode: '0640' }
    - { name: chain.pem,     mode: '0644' }
  failed_when: false
  tags: certbot

# ── Step 7: Markers ───────────────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Write .ok marker (LE active)"
  ansible.builtin.file:
    path: "{{ _marker_ok }}"
    state: touch
    mode: '0644'
  when: _le_active | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Remove .pending marker (LE active)"
  ansible.builtin.file:
    path: "{{ _marker_pending }}"
    state: absent
  when: _le_active | bool
  tags: certbot

- name: "[{{ vdomain.mx_hostname }}] Write .pending marker (DNS not yet correct)"
  ansible.builtin.copy:
    dest: "{{ _marker_pending }}"
    content: |
      hostname:   {{ vdomain.mx_hostname }}
      dns_result: {{ _dns_mx.stdout | default('(nothing)') | trim }}
      server_ip:  {{ certbot_server_ip }}
      timestamp:  {{ ansible_date_time.iso8601 }}

      Action required:
        Add DNS A record: {{ vdomain.mx_hostname }} → {{ certbot_server_ip }}
      {% for s in certbot_extra_subdomain_prefixes %}
        Add DNS A record: {{ s }}.{{ _base_domain }} → {{ certbot_server_ip }}   (optional, for SAN)
      {% endfor %}

        Then re-run:
          ansible-playbook playbooks/site.yml --tags certbot
    mode: '0644'
  when: _need_selfsigned | bool
  tags: certbot

# ── Step 8: Summary ───────────────────────────────────────────────────────────

- name: "[{{ vdomain.mx_hostname }}] Certificate result summary"
  ansible.builtin.debug:
    msg: >-
      {{ vdomain.mx_hostname }}:
      dns_ok={{ _dns_ok }},
      le_active={{ _le_active }},
      self_signed={{ _need_selfsigned }},
      renewal_conf={{ _renewal_after.stat.exists }},
      sans={{ _extra_sans | default([]) }}
  tags: certbot
