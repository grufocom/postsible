---
# roles/certbot/tasks/main.yml
#
# Cert issuance is completely nginx-independent:
#   - webroot is used when nginx is already active (it serves /.well-known/acme-challenge/)
#   - standalone is used when nginx is not yet running (certbot briefly binds port 80)
# After all certs are issued, postfix/dovecot configs are updated and services reloaded.
# nginx is reloaded only per-host in cert_for_host.yml, and only when a new cert was issued.

# ── 1. Packages ───────────────────────────────────────────────────────────────

- name: Install certbot and tools
  ansible.builtin.apt:
    name:
      - certbot
      - openssl
      - dnsutils
    state: present
    update_cache: true
  tags: certbot

- name: Ensure webroot directory exists
  ansible.builtin.file:
    path: "{{ certbot_webroot }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: certbot

- name: Ensure cert status directory exists
  ansible.builtin.file:
    path: "{{ certbot_pending_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: certbot

- name: Ensure ssl-cert group exists
  ansible.builtin.group:
    name: ssl-cert
    state: present
    system: true
  tags: certbot

- name: Add dovecot to ssl-cert group
  ansible.builtin.user:
    name: dovecot
    groups: ssl-cert
    append: true
  tags: certbot

- name: Add postfix to ssl-cert group
  ansible.builtin.user:
    name: postfix
    groups: ssl-cert
    append: true
  tags: certbot

# ── 2. Self-signed generator script ──────────────────────────────────────────

- name: Deploy self-signed certificate generator
  ansible.builtin.template:
    src: generate-selfsigned.sh.j2
    dest: "{{ certbot_selfsigned_script }}"
    owner: root
    group: root
    mode: '0750'
  tags: certbot

# ── 3. Detect public server IP ────────────────────────────────────────────────

- name: Get server public IP (ipify)
  ansible.builtin.uri:
    url: https://api.ipify.org
    return_content: true
    timeout: 5
  register: _public_ip_ipify
  failed_when: false
  changed_when: false
  tags: certbot

- name: Get server public IP (fallback via ifconfig.me)
  ansible.builtin.uri:
    url: https://ifconfig.me/ip
    return_content: true
    timeout: 5
  register: _public_ip_fallback
  failed_when: false
  changed_when: false
  when: _public_ip_ipify.content is not defined or _public_ip_ipify.content | trim == ''
  tags: certbot

- name: Set server IP fact
  ansible.builtin.set_fact:
    certbot_server_ip: >-
      {{
        (_public_ip_ipify.content | default('') | trim)
        if (_public_ip_ipify.content | default('') | trim != '')
        else (_public_ip_fallback.content | default(ansible_default_ipv4.address) | trim)
      }}
  tags: certbot

- name: Show detected server IP
  ansible.builtin.debug:
    msg: "Server public IP: {{ certbot_server_ip }}"
  tags: certbot

# ── 4. Issue certs per mx_hostname ────────────────────────────────────────────

- name: Process SSL certificate for each mx_hostname
  ansible.builtin.include_tasks: cert_for_host.yml
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    loop_var: vdomain
    label: "{{ vdomain.mx_hostname }}"
  tags: certbot

# ── 5. Configure postfix and dovecot with primary cert ───────────────────────

- name: Set primary certificate paths
  ansible.builtin.set_fact:
    primary_cert_fullchain: "{{ certbot_cert_path }}/{{ mail_virtual_domains[0].mx_hostname }}/fullchain.pem"
    primary_cert_privkey: "{{ certbot_cert_path }}/{{ mail_virtual_domains[0].mx_hostname }}/privkey.pem"
  tags: certbot

- name: Update Postfix TLS configuration
  ansible.builtin.lineinfile:
    path: /etc/postfix/main.cf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - regexp: '^smtpd_tls_cert_file\s*='
      line: "smtpd_tls_cert_file = {{ primary_cert_fullchain }}"
    - regexp: '^smtpd_tls_key_file\s*='
      line: "smtpd_tls_key_file = {{ primary_cert_privkey }}"
    - regexp: '^smtp_tls_cert_file\s*='
      line: "smtp_tls_cert_file = {{ primary_cert_fullchain }}"
    - regexp: '^smtp_tls_key_file\s*='
      line: "smtp_tls_key_file = {{ primary_cert_privkey }}"
    - regexp: '^smtpd_tls_security_level\s*='
      line: "smtpd_tls_security_level = may"
  notify: reload postfix
  tags: certbot

- name: Update Dovecot SSL configuration
  ansible.builtin.lineinfile:
    path: /etc/dovecot/conf.d/10-ssl.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - regexp: '^ssl_server_cert_file\s*='
      line: "ssl_server_cert_file = {{ primary_cert_fullchain }}"
    - regexp: '^ssl_server_key_file\s*='
      line: "ssl_server_key_file = {{ primary_cert_privkey }}"
    - regexp: '^ssl\s*='
      line: "ssl = required"
  notify: reload dovecot
  tags: certbot

- name: Remove deprecated Dovecot SSL directives
  ansible.builtin.lineinfile:
    path: /etc/dovecot/conf.d/10-ssl.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - '^ssl_cert\s*='
    - '^ssl_key\s*='
  notify: reload dovecot
  tags: certbot

# ── 6. Renewal hooks ──────────────────────────────────────────────────────────

- name: Ensure renewal-hooks directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/letsencrypt/renewal-hooks/deploy
    - /etc/letsencrypt/renewal-hooks/post
  tags: certbot

- name: Deploy certbot deploy hook (fix permissions)
  ansible.builtin.template:
    src: deploy-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/fix-permissions.sh
    owner: root
    group: root
    mode: '0755'
  tags: certbot

- name: Deploy certbot post-renewal hook (reload services)
  ansible.builtin.template:
    src: renewal-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/post/reload-services.sh
    owner: root
    group: root
    mode: '0755'
  when: certbot_renewal_hooks_enabled
  tags: certbot

- name: Enable certbot renewal timer
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
  tags: certbot

# ── 7. Deployment summary ─────────────────────────────────────────────────────

- name: Build certificate status summary
  ansible.builtin.shell: |
    echo "SSL Certificate Status:"
    for f in {{ certbot_pending_dir }}/*.ok 2>/dev/null; do
      [ -f "$f" ] && echo "  ✓ $(basename "$f" .ok)  [Let's Encrypt]"
    done
    for f in {{ certbot_pending_dir }}/*.pending 2>/dev/null; do
      [ -f "$f" ] && echo "  ⚠ $(basename "$f" .pending)  [self-signed – DNS pending]"
    done
    echo ""
    echo "To retry after DNS changes:"
    echo "  ansible-playbook playbooks/site.yml --tags certbot"
  register: _cert_summary
  changed_when: false
  tags: certbot

- name: Display certificate status
  ansible.builtin.debug:
    msg: "{{ _cert_summary.stdout_lines }}"
  tags: certbot

- name: Write certificate status to deployment summary
  ansible.builtin.blockinfile:
    path: /etc/postsible/deployment_summary.txt
    marker: "# {mark} ANSIBLE MANAGED - certificate status"
    create: true
    block: "{{ _cert_summary.stdout }}"
  tags: certbot
