---
# roles/certbot/tasks/main.yml
#
# Cert issuance is completely nginx-independent:
#   - webroot is used when nginx is already active (it serves /.well-known/acme-challenge/)
#   - standalone is used when nginx is not yet running (certbot briefly binds port 80)
# After all certs are issued, postfix/dovecot configs are updated and services reloaded.
# nginx is reloaded only per-host in cert_for_host.yml, and only when a new cert was issued.

# ── 1. Packages ───────────────────────────────────────────────────────────────

- name: Install certbot and tools
  ansible.builtin.apt:
    name:
      - certbot
      - openssl
      - dnsutils
    state: present
    update_cache: true
  tags: certbot

- name: Ensure webroot directory exists
  ansible.builtin.file:
    path: "{{ certbot_webroot }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: certbot

- name: Ensure cert status directory exists
  ansible.builtin.file:
    path: "{{ certbot_pending_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: certbot

- name: Ensure ssl-cert group exists
  ansible.builtin.group:
    name: ssl-cert
    state: present
    system: true
  tags: certbot

- name: Add dovecot to ssl-cert group
  ansible.builtin.user:
    name: dovecot
    groups: ssl-cert
    append: true
  tags: certbot

- name: Add postfix to ssl-cert group
  ansible.builtin.user:
    name: postfix
    groups: ssl-cert
    append: true
  tags: certbot

# ── 2. Self-signed generator script ──────────────────────────────────────────

- name: Deploy self-signed certificate generator
  ansible.builtin.template:
    src: generate-selfsigned.sh.j2
    dest: "{{ certbot_selfsigned_script }}"
    owner: root
    group: root
    mode: '0750'
  tags: certbot

# ── 3. Detect public server IP ────────────────────────────────────────────────

- name: Get server public IP (ipify)
  ansible.builtin.uri:
    url: https://api.ipify.org
    return_content: true
    timeout: 5
  register: _public_ip_ipify
  failed_when: false
  changed_when: false
  tags: certbot

- name: Get server public IP (fallback via ifconfig.me)
  ansible.builtin.uri:
    url: https://ifconfig.me/ip
    return_content: true
    timeout: 5
  register: _public_ip_fallback
  failed_when: false
  changed_when: false
  when: _public_ip_ipify.content is not defined or _public_ip_ipify.content | trim == ''
  tags: certbot

- name: Set server IP fact
  ansible.builtin.set_fact:
    certbot_server_ip: >-
      {{
        (_public_ip_ipify.content | default('') | trim)
        if (_public_ip_ipify.content | default('') | trim != '')
        else (_public_ip_fallback.content | default(ansible_default_ipv4.address) | trim)
      }}
  tags: certbot

- name: Show detected server IP
  ansible.builtin.debug:
    msg: "Server public IP: {{ certbot_server_ip }}"
  tags: certbot

# ── 4. Stop nginx before certbot standalone (needs port 80 free) ─────────────
# certbot --standalone binds port 80 itself for the ACME challenge.
# nginx is restarted in step 5 after all certs are issued.

- name: Check if nginx is running before certbot
  ansible.builtin.command: systemctl is-active nginx
  register: _nginx_was_running
  changed_when: false
  failed_when: false
  tags: certbot

- name: Stop nginx before certbot standalone (free up port 80)
  ansible.builtin.systemd:
    name: nginx
    state: stopped
  when: _nginx_was_running.stdout | trim == 'active'
  tags: certbot

# ── 5. Issue certs per mx_hostname (standalone, port 80 is free) ─────────────

- name: Process SSL certificate for each mx_hostname
  ansible.builtin.include_tasks: cert_for_host.yml
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    loop_var: vdomain
    label: "{{ vdomain.mx_hostname }}"
  tags: certbot

# ── 6a. Restart nginx after all certs issued ─────────────────────────────────

- name: Start nginx after certbot standalone
  ansible.builtin.systemd:
    name: nginx
    state: started
  when: _nginx_was_running.stdout | trim == 'active'
  failed_when: false
  tags: certbot

# ── 6b. Patch renewal configs to use webroot for automatic renewal ────────────
# Initial issuance uses --standalone, but certbot saves the authenticator in the
# renewal config. We patch it to webroot so that 'certbot renew' (via timer)
# works with nginx running and does NOT require stopping nginx.

- name: Remove spurious renewal configs for SAN subdomains
  # certbot --standalone creates a renewal conf for every -d entry.
  # Only the mx_hostname conf is valid; autoconfig/autodiscover entries are SANs,
  # not standalone certs, and their confs are empty/broken.
  ansible.builtin.shell: |
    for domain in {{ certbot_extra_subdomain_prefixes | map('regex_replace', '^(.*)$', '\1.' + item.domain) | join(' ') }}; do
      rm -f "/etc/letsencrypt/renewal/${domain}.conf"
      rmdir "/etc/letsencrypt/live/${domain}" 2>/dev/null || true
      rmdir "/etc/letsencrypt/archive/${domain}" 2>/dev/null || true
    done
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  changed_when: false
  failed_when: false
  tags: certbot

- name: Patch renewal configs - set authenticator to webroot
  ansible.builtin.replace:
    path: "/etc/letsencrypt/renewal/{{ item.mx_hostname }}.conf"
    regexp: '^authenticator\s*=.*$'
    replace: "authenticator = webroot"
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  failed_when: false
  tags: certbot

- name: Patch renewal configs - set webroot path (no trailing comma)
  ansible.builtin.replace:
    path: "/etc/letsencrypt/renewal/{{ item.mx_hostname }}.conf"
    regexp: '^webroot_path\s*=.*$'
    replace: "webroot_path = {{ certbot_webroot }}"
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  failed_when: false
  tags: certbot

- name: Patch renewal configs - add webroot map section for all domains in cert
  ansible.builtin.blockinfile:
    path: "/etc/letsencrypt/renewal/{{ item.mx_hostname }}.conf"
    marker: "# {mark} ANSIBLE MANAGED - webroot map"
    block: |
      [webroot_map]
      {{ item.mx_hostname }} = {{ certbot_webroot }}
      {% for prefix in certbot_extra_subdomain_prefixes %}
      {{ prefix }}.{{ item.domain }} = {{ certbot_webroot }}
      {% endfor %}
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  failed_when: false
  tags: certbot

# ── 6c. Configure postfix and dovecot with primary cert ───────────────────────

- name: Set primary certificate paths
  ansible.builtin.set_fact:
    primary_cert_fullchain: "{{ certbot_cert_path }}/{{ mail_virtual_domains[0].mx_hostname }}/fullchain.pem"
    primary_cert_privkey: "{{ certbot_cert_path }}/{{ mail_virtual_domains[0].mx_hostname }}/privkey.pem"
  tags: certbot

- name: Update Postfix TLS configuration
  ansible.builtin.lineinfile:
    path: /etc/postfix/main.cf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - regexp: '^smtpd_tls_cert_file\s*='
      line: "smtpd_tls_cert_file = {{ primary_cert_fullchain }}"
    - regexp: '^smtpd_tls_key_file\s*='
      line: "smtpd_tls_key_file = {{ primary_cert_privkey }}"
    - regexp: '^smtp_tls_cert_file\s*='
      line: "smtp_tls_cert_file = {{ primary_cert_fullchain }}"
    - regexp: '^smtp_tls_key_file\s*='
      line: "smtp_tls_key_file = {{ primary_cert_privkey }}"
    - regexp: '^smtpd_tls_security_level\s*='
      line: "smtpd_tls_security_level = may"
  notify: reload postfix
  tags: certbot

- name: Update Dovecot SSL configuration
  ansible.builtin.lineinfile:
    path: /etc/dovecot/conf.d/10-ssl.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - regexp: '^ssl_server_cert_file\s*='
      line: "ssl_server_cert_file = {{ primary_cert_fullchain }}"
    - regexp: '^ssl_server_key_file\s*='
      line: "ssl_server_key_file = {{ primary_cert_privkey }}"
    - regexp: '^ssl\s*='
      line: "ssl = required"
  notify: reload dovecot
  tags: certbot

- name: Remove deprecated Dovecot SSL directives
  ansible.builtin.lineinfile:
    path: /etc/dovecot/conf.d/10-ssl.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - '^ssl_cert\s*='
    - '^ssl_key\s*='
  notify: reload dovecot
  tags: certbot

# ── 7. Renewal hooks ──────────────────────────────────────────────────────────

- name: Ensure renewal-hooks directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/letsencrypt/renewal-hooks/deploy
    - /etc/letsencrypt/renewal-hooks/post
  tags: certbot

- name: Deploy certbot deploy hook (fix permissions)
  ansible.builtin.template:
    src: deploy-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/fix-permissions.sh
    owner: root
    group: root
    mode: '0755'
  tags: certbot

- name: Deploy certbot post-renewal hook (reload services)
  ansible.builtin.template:
    src: renewal-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/post/reload-services.sh
    owner: root
    group: root
    mode: '0755'
  when: certbot_renewal_hooks_enabled
  tags: certbot

- name: Enable certbot renewal timer
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
  tags: certbot

# ── 8. Deployment summary ─────────────────────────────────────────────────────

- name: Build certificate status summary
  ansible.builtin.shell: |
    set +o noglob
    echo "SSL Certificate Status:"
    find {{ certbot_pending_dir }} -maxdepth 1 -name '*.ok' 2>/dev/null | sort | while read -r f; do
      echo "  OK $(basename "$f" .ok)  [Let's Encrypt]"
    done
    find {{ certbot_pending_dir }} -maxdepth 1 -name '*.pending' 2>/dev/null | sort | while read -r f; do
      echo "  PENDING $(basename "$f" .pending)  [self-signed - DNS pending]"
    done
    echo ""
    echo "To retry after DNS changes:"
    echo "  ansible-playbook playbooks/site.yml --tags certbot"
  register: _cert_summary
  changed_when: false
  tags: certbot

- name: Display certificate status
  ansible.builtin.debug:
    msg: "{{ _cert_summary.stdout_lines }}"
  tags: certbot

- name: Write certificate status to deployment summary
  ansible.builtin.blockinfile:
    path: /etc/postsible/deployment_summary.txt
    marker: "# {mark} ANSIBLE MANAGED - certificate status"
    create: true
    block: "{{ _cert_summary.stdout }}"
  tags: certbot
