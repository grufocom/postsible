---
# roles/autoconfig/tasks/nginx_https.yml
# Creates HTTPS vhosts for autoconfig per domain.
# Cert path is identical for LE and self-signed.

- name: Create HTTPS nginx config for autoconfig per domain
  ansible.builtin.template:
    src: nginx_https.conf.j2
    dest: "/etc/nginx/sites-available/autoconfig-{{ item.domain }}-https.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  notify: reload nginx

- name: Enable HTTPS nginx config for autoconfig
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/autoconfig-{{ item.domain }}-https.conf"
    dest: "/etc/nginx/sites-enabled/autoconfig-{{ item.domain }}-https.conf"
    state: link
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  notify: reload nginx

- name: Test nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  register: _nginx_test
  failed_when: _nginx_test.rc != 0
