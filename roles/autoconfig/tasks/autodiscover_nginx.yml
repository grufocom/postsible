---
# roles/autoconfig/tasks/autodiscover_nginx.yml
# HTTPS vhosts for autodiscover.<domain> – after certbot ran.

- name: Create HTTPS nginx config for autodiscover per domain
  ansible.builtin.template:
    src: nginx_autodiscover_https.conf.j2
    dest: "/etc/nginx/sites-available/autodiscover-{{ item.domain }}-https.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  notify: reload nginx

- name: Enable HTTPS nginx config for autodiscover
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/autodiscover-{{ item.domain }}-https.conf"
    dest: "/etc/nginx/sites-enabled/autodiscover-{{ item.domain }}-https.conf"
    state: link
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  notify: reload nginx
