# roles/autoconfig/tasks/setup_directories.yml
---
- name: Ensure nginx is installed
  ansible.builtin.package:
    name: nginx
    state: present
  tags: autoconfig

- name: Create certbot webroot
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: autoconfig

- name: Create autoconfig base directory
  ansible.builtin.file:
    path: /var/www/autoconfig
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: autoconfig

- name: Create complete autoconfig directory structure for all domains
  ansible.builtin.file:
    path: "/var/www/autoconfig/{{ item.0.domain }}/{{ item.1 }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  loop: "{{ mail_virtual_domains | product(subpaths) | list }}"
  vars:
    subpaths:
      - ""
      - "mail"
      - ".well-known/autoconfig/mail"
      - "autodiscover"
  loop_control:
    label: "{{ item.0.domain }} - {{ item.1 }}"
  when: >
    (item.1 != 'autodiscover') or
    (item.1 == 'autodiscover' and autoconfig_enable_autodiscover | default(true))
  tags: autoconfig
