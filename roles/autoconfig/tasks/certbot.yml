---
# roles/autoconfig/tasks/certbot.yml
# Issues certs for autoconfig.<domain> and autodiscover.<domain>
# Same self-signed fallback logic as the main certbot role.

- name: Get server public IP
  ansible.builtin.uri:
    url: https://api.ipify.org
    return_content: yes
    timeout: 5
  register: _ac_public_ip
  failed_when: false
  changed_when: false

- name: Set server IP fact
  ansible.builtin.set_fact:
    _ac_server_ip: "{{ _ac_public_ip.content | default(ansible_default_ipv4.address) | trim }}"

- name: Deploy self-signed generator (idempotent)
  ansible.builtin.template:
    src: generate-autoconfig-selfsigned.sh.j2
    dest: /usr/local/bin/postsible-generate-autoconfig-selfsigned
    owner: root
    group: root
    mode: '0750'

- name: Process autoconfig certificate per domain
  ansible.builtin.include_tasks: certbot_per_domain.yml
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    loop_var: _ac_domain
    label: "{{ _ac_domain.domain }}"
