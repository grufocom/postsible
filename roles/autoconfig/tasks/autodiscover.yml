---
# roles/autoconfig/tasks/autodiscover.yml
# Generates Microsoft Autodiscover XML per domain

- name: Generate Autodiscover XML per domain
  ansible.builtin.template:
    src: autodiscover.xml.j2
    dest: "/var/www/autoconfig/{{ item.domain }}/autodiscover/autodiscover.xml"
    owner: www-data
    group: www-data
    mode: '0644'
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  when: autoconfig_enable_autodiscover | default(true)
