---
# roles/autoconfig/tasks/certbot_per_domain.yml
# Called with loop_var: _ac_domain

# ── autoconfig.<domain> ───────────────────────────────────────────────────────

- name: "[autoconfig.{{ _ac_domain.domain }}] Check DNS"
  ansible.builtin.command: "dig +short autoconfig.{{ _ac_domain.domain }} A"
  register: _ac_dns
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[autoconfig.{{ _ac_domain.domain }}] Ensure cert dir"
  ansible.builtin.file:
    path: "/etc/letsencrypt/live/autoconfig.{{ _ac_domain.domain }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: '0750'

- name: "[autoconfig.{{ _ac_domain.domain }}] Generate self-signed (always as fallback)"
  ansible.builtin.command: >
    /usr/local/bin/postsible-generate-autoconfig-selfsigned autoconfig.{{ _ac_domain.domain }}
  args:
    creates: "/etc/letsencrypt/live/autoconfig.{{ _ac_domain.domain }}/fullchain.pem"

- name: "[autoconfig.{{ _ac_domain.domain }}] Check existing LE cert"
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/autoconfig.{{ _ac_domain.domain }}/fullchain.pem"
  register: _ac_cert_exists

- name: "[autoconfig.{{ _ac_domain.domain }}] Obtain Let's Encrypt cert"
  ansible.builtin.command: >
    certbot certonly
    --webroot
    --webroot-path /var/www/certbot
    --email {{ _ac_domain.admin_email }}
    --agree-tos
    --no-eff-email
    --non-interactive
    -d autoconfig.{{ _ac_domain.domain }}
  when:
    - _ac_dns.stdout | trim == _ac_server_ip | trim
    - not autoconfig_skip_certbot | default(false)
  register: _ac_le_result
  failed_when: false

# ── autodiscover.<domain> ─────────────────────────────────────────────────────

- name: "[autodiscover.{{ _ac_domain.domain }}] Check DNS"
  ansible.builtin.command: "dig +short autodiscover.{{ _ac_domain.domain }} A"
  register: _ad_dns
  changed_when: false
  failed_when: false
  check_mode: false
  when: autoconfig_enable_autodiscover | default(true)

- name: "[autodiscover.{{ _ac_domain.domain }}] Ensure cert dir"
  ansible.builtin.file:
    path: "/etc/letsencrypt/live/autodiscover.{{ _ac_domain.domain }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: '0750'
  when: autoconfig_enable_autodiscover | default(true)

- name: "[autodiscover.{{ _ac_domain.domain }}] Generate self-signed (fallback)"
  ansible.builtin.command: >
    /usr/local/bin/postsible-generate-autoconfig-selfsigned autodiscover.{{ _ac_domain.domain }}
  args:
    creates: "/etc/letsencrypt/live/autodiscover.{{ _ac_domain.domain }}/fullchain.pem"
  when: autoconfig_enable_autodiscover | default(true)

- name: "[autodiscover.{{ _ac_domain.domain }}] Obtain Let's Encrypt cert"
  ansible.builtin.command: >
    certbot certonly
    --webroot
    --webroot-path /var/www/certbot
    --email {{ _ac_domain.admin_email }}
    --agree-tos
    --no-eff-email
    --non-interactive
    -d autodiscover.{{ _ac_domain.domain }}
  when:
    - autoconfig_enable_autodiscover | default(true)
    - _ad_dns.stdout | trim == _ac_server_ip | trim
    - not autoconfig_skip_certbot | default(false)
  register: _ad_le_result
  failed_when: false

- name: "[{{ _ac_domain.domain }}] Certificate summary"
  ansible.builtin.debug:
    msg: |
      autoconfig.{{ _ac_domain.domain }}:
        DNS ok: {{ _ac_dns.stdout | trim == _ac_server_ip | trim }}
        LE result: {{ 'success' if (_ac_le_result.rc | default(1)) == 0 else 'skipped/failed – self-signed active' }}
      autodiscover.{{ _ac_domain.domain }}:
        DNS ok: {{ _ad_dns.stdout | default('') | trim == _ac_server_ip | trim }}
        LE result: {{ 'success' if (_ad_le_result.rc | default(1)) == 0 else 'skipped/failed – self-signed active' }}
