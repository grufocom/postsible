# roles/snappymail/tasks/main.yml
---
# ── Installation ──────────────────────────────────────────────────────────────

- name: Detect installed SnappyMail version
  ansible.builtin.shell: |
    if [ -f "{{ snappymail_install_path }}/index.php" ]; then
      grep -oP "(?<=APP_VERSION', ')[^']+" {{ snappymail_install_path }}/index.php 2>/dev/null || echo "unknown"
    else
      echo "not_installed"
    fi
  register: snappymail_installed_version
  changed_when: false
  tags: snappymail

- name: Resolve SnappyMail version to install
  ansible.builtin.uri:
    url: https://api.github.com/repos/the-djmaze/snappymail/releases/latest
    return_content: yes
    timeout: 10
  register: snappymail_latest_release
  failed_when: false
  changed_when: false
  when: snappymail_version == "latest"
  tags: snappymail

- name: Set resolved SnappyMail version
  ansible.builtin.set_fact:
    snappymail_version_detected: >-
      {{
        snappymail_latest_release.json.tag_name | default('v2.38.2') | regex_replace('^v', '')
        if snappymail_version == 'latest'
        else snappymail_version
      }}
  tags: snappymail

- name: Create SnappyMail directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
    mode: '0755'
  loop:
    - "{{ snappymail_install_path }}"
    - "{{ snappymail_data_path }}"
    - "{{ snappymail_data_path }}/_data_/_default_/configs"
    - "{{ snappymail_log_path }}"
  tags: snappymail

- name: Download SnappyMail
  ansible.builtin.get_url:
    url: "https://github.com/the-djmaze/snappymail/releases/download/v{{ snappymail_version_detected }}/snappymail-{{ snappymail_version_detected }}.tar.gz"
    dest: "/tmp/snappymail-{{ snappymail_version_detected }}.tar.gz"
    timeout: 60
  when: snappymail_installed_version.stdout == "not_installed"
  tags: snappymail

- name: Extract SnappyMail
  ansible.builtin.unarchive:
    src: "/tmp/snappymail-{{ snappymail_version_detected }}.tar.gz"
    dest: "{{ snappymail_install_path }}"
    remote_src: yes
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
  when: snappymail_installed_version.stdout == "not_installed"
  tags: snappymail

# Deploy application.ini AFTER extraction so it overwrites the default.
# The template is always deployed (not conditional on installation) so that
# config changes are applied on re-runs too.
- name: Deploy SnappyMail application.ini
  ansible.builtin.template:
    src: application.ini.j2
    dest: "{{ snappymail_data_path }}/_data_/_default_/configs/application.ini"
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
    mode: '0640'
    force: yes
  tags: snappymail

# ── Create domains directory ───────────────────────────────────────────────────
- name: Ensure domains directory exists
  ansible.builtin.file:
    path: "{{ snappymail_data_path }}/_data_/_default_/domains"
    state: directory
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
    mode: '0755'
  tags: snappymail

# roles/snappymail/tasks/main.yml
- name: Deploy domain configuration for each domain
  ansible.builtin.template:
    src: domain.json.j2
    dest: "{{ snappymail_data_path }}/_data_/_default_/domains/{{ item.domain }}.json"
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
    mode: '0640'
  loop: "{{ mail_virtual_domains }}"
  tags: snappymail

# ── Clear cache after domain changes ──────────────────────────────────────────
- name: Clear SnappyMail cache
  ansible.builtin.file:
    path: "{{ snappymail_data_path }}/_data_/_default_/cache"
    state: absent
  notify: restart php-fpm
  tags: snappymail

- name: Recreate cache directory
  ansible.builtin.file:
    path: "{{ snappymail_data_path }}/_data_/_default_/cache"
    state: directory
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
    mode: '0755'
  tags: snappymail

# ── Plugin JS files ───────────────────────────────────────────────────────────

- name: Create SnappyMail plugin directory
  ansible.builtin.file:
    path: "{{ snappymail_install_path }}/plugins"
    state: directory
    owner: "{{ snappymail_user }}"
    group: "{{ snappymail_group }}"
    mode: '0755'
  tags: snappymail

- name: Create vacation plugin JS file
  ansible.builtin.copy:
    dest: /var/www/vacation-plugin.js
    content: |
      // Vacation Plugin for SnappyMail
      (function() {
          console.log('Vacation plugin loaded');
      })();
    owner: www-data
    group: www-data
    mode: '0644'
  tags: snappymail

- name: Create signature plugin JS file
  ansible.builtin.copy:
    dest: /var/www/signature-plugin.js
    content: |
      // Signature Plugin for SnappyMail
      (function() {
          console.log('Signature plugin loaded');
      })();
    owner: www-data
    group: www-data
    mode: '0644'
  tags: snappymail

# ── nginx: insert SnappyMail into EVERY domain vhost ─────────────────────────

- name: Check if nginx vhost files exist
  ansible.builtin.stat:
    path: "/etc/nginx/sites-available/{{ item.mx_hostname }}.conf"
  register: nginx_vhost_check
  loop: "{{ mail_virtual_domains }}"
  tags: snappymail

- name: Insert SnappyMail location into each domain vhost
  ansible.builtin.blockinfile:
    path: "/etc/nginx/sites-available/{{ item.item.mx_hostname }}.conf"
    marker: "    # {mark} ANSIBLE MANAGED BLOCK - SnappyMail"
    insertafter: "# INSERT SNAPPY HERE – {{ item.item.mx_hostname }}"
    block: |2
          # SnappyMail Webmail
          location {{ snappymail_url_path }}/ {
              alias {{ snappymail_install_path }}/;
              index index.php;

              sub_filter '</body>' '<script src="{{ snappymail_url_path }}/vacation-plugin.js"></script><script src="{{ snappymail_url_path }}/signature-plugin.js"></script></body>';
              sub_filter_once on;
              # text/html is nginx's built-in default – do NOT list it in sub_filter_types
              sub_filter_types application/xhtml+xml;

              try_files $uri $uri/ @snappymail_{{ item.item.mx_hostname | replace('.','_') }};

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:{{ nginx_php_fpm_socket }};
                  fastcgi_param SCRIPT_FILENAME $request_filename;
                  include fastcgi_params;
                  fastcgi_read_timeout 300;
                  fastcgi_send_timeout 300;
              }

              location = {{ snappymail_url_path }}/vacation-plugin.js {
                  alias /var/www/vacation-plugin.js;
                  add_header Cache-Control "no-cache, must-revalidate";
                  add_header Content-Type "application/javascript";
              }
              location = {{ snappymail_url_path }}/signature-plugin.js {
                  alias /var/www/signature-plugin.js;
                  add_header Cache-Control "no-cache, must-revalidate";
                  add_header Content-Type "application/javascript";
              }

              location ~ ^{{ snappymail_url_path }}/data {
                  deny all;
              }
          }

          location @snappymail_{{ item.item.mx_hostname | replace('.','_') }} {
              rewrite ^{{ snappymail_url_path }}/(.*)$ {{ snappymail_url_path }}/index.php?$1 last;
          }

  loop: "{{ nginx_vhost_check.results | selectattr('stat.exists', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.item.mx_hostname }}"
  when: item.stat.exists
  notify: reload nginx
  tags: snappymail

# ── Reload nginx ──────────────────────────────────────────────────────────────

- name: Check if nginx is currently running
  ansible.builtin.command: systemctl is-active nginx
  register: _snappy_nginx_active
  changed_when: false
  failed_when: false
  tags: snappymail

- name: Reload nginx to pick up SnappyMail config (only if already running)
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when: _snappy_nginx_active.stdout | trim == 'active'
  tags: snappymail

# ── Summary ───────────────────────────────────────────────────────────────────

- name: Display SnappyMail information
  ansible.builtin.debug:
    msg: |
      SnappyMail installed – accessible on all domains:
      {% for d in mail_virtual_domains %}
        • https://{{ d.mx_hostname }}{{ snappymail_url_path }}/
      {% endfor %}
      Admin: https://{{ mail_virtual_domains[0].mx_hostname }}{{ snappymail_url_path }}/?admin
  tags: snappymail
