# roles/ufw/tasks/main.yml
---
- name: Install UFW
  apt:
    name: 
      - ufw
      - iptables
    state: present
    update_cache: true
  tags: ufw

- name: Load nf_conntrack module immediately
  modprobe:
    name: nf_conntrack
  tags: ufw

- name: Persist nf_conntrack module
  copy:
    dest: /etc/modules-load.d/nf_conntrack.conf
    content: nf_conntrack
    mode: '0644'
  tags: ufw

- name: Configure sysctl parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop: "{{ common_sysctl_params | dict2items }}"
  tags: ufw

- name: Reset UFW to default state (only on first run)
  ufw:
    state: reset
  when: ufw_reset | default(false)
  tags: ufw

- name: Set UFW default policies
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - {direction: 'incoming', policy: 'deny'}
    - {direction: 'outgoing', policy: 'allow'}
    - {direction: 'routed', policy: 'deny'}
  tags: ufw

- name: Configure UFW logging
  ufw:
    logging: "{{ ufw_logging_level }}"
  tags: ufw

- name: Set IP validation regex
  set_fact:
    ipv4_regex: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
    ipv6_regex: '^([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^([0-9a-fA-F]{1,4}:){1,7}:$|^([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}$|^([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}$|^([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}$|^([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}$|^([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}$|^[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})$|^:((:[0-9a-fA-F]{1,4}){1,7}|:)$|^fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}$|^::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])$|^([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])$'
  tags: ufw

- name: Validate and filter trusted SSH IPs
  set_fact:
    ufw_ssh_trusted_ips_valid: >-
      {{
        ufw_ssh_trusted_ips
        | default([])
        | selectattr('ip', 'defined')
        | selectattr('ip', 'match', ipv4_regex + '|' + ipv6_regex)
        | list
      }}
  tags: ufw

- name: Warn about invalid IP entries
  debug:
    msg: "⚠️  WARNING: Invalid IP address '{{ item.ip }}' will be ignored!"
  loop: "{{ ufw_ssh_trusted_ips | default([]) }}"
  when:
    - item.ip is defined
    - item.ip is not match(ipv4_regex + '|' + ipv6_regex)
  tags: ufw

- name: Show valid trusted IPs
  debug:
    msg: "✓ Valid trusted IPs: {{ ufw_ssh_trusted_ips_valid | map(attribute='ip') | join(', ') }}"
  when: ufw_ssh_trusted_ips_valid | length > 0
  tags: ufw

- name: Allow SSH from validated trusted IPs
  ufw:
    rule: allow
    port: "{{ ufw_ssh_port }}"
    proto: tcp
    from_ip: "{{ item.ip }}"
    comment: "{{ item.comment | default('Trusted SSH IP') }}"
  loop: "{{ ufw_ssh_trusted_ips_valid }}"
  when: ufw_ssh_trusted_ips_valid | length > 0
  tags: ufw

- name: Deny SSH from all other IPs (when trusted IPs are configured)
  ufw:
    rule: deny
    port: "{{ ufw_ssh_port }}"
    proto: tcp
    comment: "Deny SSH from untrusted IPs"
  when: ufw_ssh_trusted_ips_valid | length > 0
  tags: ufw

- name: Apply rate limiting for SSH (fallback when no valid trusted IPs)
  ufw:
    rule: limit
    port: "{{ ufw_ssh_port }}"
    proto: tcp
    comment: "SSH rate limiting (no trusted IPs configured)"
  when: ufw_ssh_trusted_ips_valid | length == 0
  tags: ufw

- name: Display SSH access configuration (with trusted IPs)
  debug:
    msg:
      - "==========================================="
      - "SSH Access Configuration:"
      - "==========================================="
      - "Port: {{ ufw_ssh_port }}"
      - "Valid trusted IPs: {{ ufw_ssh_trusted_ips_valid | length }}"
      - "Trusted IPs: {{ ufw_ssh_trusted_ips_valid | map(attribute='ip') | join(', ') }}"
      - "All other IPs: DENIED"
      - "==========================================="
  when: ufw_ssh_trusted_ips_valid | length > 0
  tags: ufw

- name: Display SSH access configuration (fallback mode)
  debug:
    msg:
      - "==========================================="
      - "⚠️  SSH Access Configuration (FALLBACK MODE)"
      - "==========================================="
      - "Port: {{ ufw_ssh_port }}"
      - "No valid trusted IPs configured!"
      - ""
      - "SSH is accessible from ANYWHERE with rate limiting"
      - ""
      - "To restrict SSH, add valid IPs to ufw_ssh_trusted_ips:"
      - "  ufw_ssh_trusted_ips:"
      - "    - ip: 192.168.1.100"
      - "      comment: 'Office'"
      - "    - ip: 2001:db8::1"
      - "      comment: 'IPv6 Office'"
      - "==========================================="
  when: ufw_ssh_trusted_ips_valid | length == 0
  tags: ufw

# Mail Server Ports
- name: Allow SMTP (Port 25)
  ufw:
    rule: allow
    port: 25
    proto: tcp
    comment: "SMTP - Incoming mail"
  tags: ufw

- name: Allow Submission (Port 587)
  ufw:
    rule: allow
    port: 587
    proto: tcp
    comment: "Submission - SMTP with STARTTLS"
  tags: ufw

- name: Allow SMTPS (Port 465)
  ufw:
    rule: allow
    port: "{{ mail_smtp_port }}"
    proto: tcp
    comment: "SMTPS - SMTP over SSL (optional)"
  when: ufw_enable_smtps | default(true)
  tags: ufw

- name: Allow IMAPS (Port 993)
  ufw:
    rule: allow
    port: "{{ mail_imap_port }}"
    proto: tcp
    comment: "IMAPS - IMAP over SSL"
  tags: ufw

- name: Allow POP3S (Port 995)
  ufw:
    rule: allow
    port: 995
    proto: tcp
    comment: "POP3S - POP3 over SSL"
  when: ufw_enable_pop3s | default(false)
  tags: ufw

# Web Server Ports
- name: Allow HTTP (Port 80)
  ufw:
    rule: allow
    port: 80
    proto: tcp
    comment: "HTTP - Webmail and Lets Encrypt"
  tags: ufw

- name: Allow HTTPS (Port 443)
  ufw:
    rule: allow
    port: 443
    proto: tcp
    comment: "HTTPS - Webmail and Rspamd WebUI"
  tags: ufw

# Optional: Rate limiting for mail ports (anti-spam measure)
- name: Apply rate limiting to SMTP
  ufw:
    rule: limit
    port: 25
    proto: tcp
    comment: "SMTP rate limiting"
  when: ufw_rate_limit_smtp | default(false)
  tags: ufw

# Optional: Custom ports
- name: Allow custom ports
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    from_ip: "{{ item.from_ip | default('any') }}"
    comment: "{{ item.comment | default('Custom port') }}"
  loop: "{{ ufw_custom_ports }}"
  when: ufw_custom_ports is defined and ufw_custom_ports | length > 0
  tags: ufw

# Deny commonly attacked ports
- name: Deny potentially dangerous ports
  ufw:
    rule: deny
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw_deny_ports | default([]) }}"
  when:
    - ufw_deny_specific_ports | default(false)
    - ufw_deny_ports is defined
    - ufw_deny_ports | length > 0
  tags: ufw

# Enable UFW
- name: Enable UFW
  ufw:
    state: enabled
  tags: ufw

- name: Check UFW status
  command: ufw status verbose
  register: ufw_status
  changed_when: false
  tags: ufw

- name: Display UFW status
  debug:
    var: ufw_status.stdout_lines
  tags: ufw

# Create UFW management script
- name: Create UFW management script
  template:
    src: ufw-manage.sh.j2
    dest: /usr/local/bin/ufw-manage
    mode: '0755'
  tags: ufw

- name: Create UFW backup script
  template:
    src: ufw-backup.sh.j2
    dest: /usr/local/bin/ufw-backup
    mode: '0755'
  tags: ufw

# Systemd service to ensure UFW starts before network
- name: Ensure UFW starts before network services
  systemd:
    name: ufw
    enabled: true
    state: started
  tags: ufw

