---
# roles/postfix/tasks/ssl-detection.yml
# The certbot role runs before postfix and writes the correct cert paths
# directly into /etc/postfix/main.cf via lineinfile.
# This file just verifies the certs are present and sets facts for templates.

- name: Verify Let's Encrypt certificate exists for primary mx_hostname
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ mail_virtual_domains[0].mx_hostname }}/fullchain.pem"
  register: _postfix_cert_check

- name: Set TLS cert facts from certbot-managed path
  ansible.builtin.set_fact:
    postfix_tls_cert_file: "/etc/letsencrypt/live/{{ mail_virtual_domains[0].mx_hostname }}/fullchain.pem"
    postfix_tls_key_file: "/etc/letsencrypt/live/{{ mail_virtual_domains[0].mx_hostname }}/privkey.pem"
    postfix_ssl_source: >-
      {{ 'Let\'s Encrypt' if _postfix_cert_check.stat.exists else 'self-signed (certbot fallback)' }}

- name: Display Postfix TLS certificate status
  ansible.builtin.debug:
    msg: "Postfix TLS: {{ postfix_ssl_source }} → {{ postfix_tls_cert_file }}"
