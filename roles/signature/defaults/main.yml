---
# roles/signature/defaults/main.yml

# ── Web interface ─────────────────────────────────────────────────────────────
signature_web_root:     "/var/www/signature"
signature_web_path:     "/signature"

# ── PHP-FPM ───────────────────────────────────────────────────────────────────
# Dedicated pool — allows exec() for file writes via sudo
signature_php_fpm_sock: "/run/php/php8.4-fpm-signature.sock"

# ── IMAP auth ─────────────────────────────────────────────────────────────────
# Localhost TLS, no cert verification needed
signature_imap_host:    "127.0.0.1"
signature_imap_port:    993

# ── System user running PHP-FPM ───────────────────────────────────────────────
signature_webserver_user: "www-data"

# ── Signature storage ─────────────────────────────────────────────────────────
# rspamd footer.lua reads from: {{ signature_base_dir }}/users/<email>/signature.{html,txt}
#                            and {{ signature_base_dir }}/domains/<domain>/signature.{html,txt}
signature_base_dir:     "/etc/rspamd/signatures"

# ── Helper script (called via sudo) ───────────────────────────────────────────
signature_manage:       "/usr/local/bin/signature-manage"

# ── Database (reuses existing MariaDB settings) ───────────────────────────────
signature_db_user:      "{{ mariadb_user }}"
signature_db_pass:      "{{ mariadb_password }}"
signature_db_name:      "{{ mariadb_database }}"
signature_db_host:      "{{ mariadb_host }}"

# ── Domain fallback signatures ────────────────────────────────────────────────
signature_fallback_domains: "{{ mail_virtual_domains }}"

# ── Image upload constraints ──────────────────────────────────────────────────
signature_max_image_bytes: 524288   # 512 KB
signature_image_max_px:    300      # longest edge after resize
