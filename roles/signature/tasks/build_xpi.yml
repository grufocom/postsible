---
# roles/signature/tasks/build_xpi.yml
# Builds the Postsible Tools Firefox/Thunderbird extension (.xpi).
# Called from main.yml via include_tasks.

- name: Create XPI build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: _postsible_xpi
  register: xpi_build_dir
  tags: signature_xpi

- name: Create XPI icons directory
  ansible.builtin.file:
    path: "{{ xpi_build_dir.path }}/icons"
    state: directory
    mode: '0755'
  tags: signature_xpi

- name: Copy XPI icons
  ansible.builtin.copy:
    src: "xpi-icons/{{ item }}"
    dest: "{{ xpi_build_dir.path }}/icons/{{ item }}"
    mode: '0644'
  loop:
    - postsible-48.png
    - postsible-96.png
  tags: signature_xpi

- name: Render XPI manifest.json
  ansible.builtin.template:
    src: xpi/manifest.json.j2
    dest: "{{ xpi_build_dir.path }}/manifest.json"
    mode: '0644'
  tags: signature_xpi

- name: Create XPI popup directory
  ansible.builtin.file:
    path: "{{ xpi_build_dir.path }}/popup"
    state: directory
    mode: '0755'
  tags: signature_xpi

- name: Render XPI popup.html
  ansible.builtin.template:
    src: xpi/popup.html.j2
    dest: "{{ xpi_build_dir.path }}/popup/popup.html"
    mode: '0644'
  tags: signature_xpi

- name: Render XPI popup.js
  ansible.builtin.template:
    src: xpi/popup.js.j2
    dest: "{{ xpi_build_dir.path }}/popup/popup.js"
    mode: '0644'
  tags: signature_xpi

- name: Build XPI archive
  community.general.archive:
    path: "{{ xpi_build_dir.path }}/"
    dest: "/var/www/signature/postsible-tools.xpi"
    format: zip
    owner: "{{ signature_webserver_user }}"
    group: "{{ signature_webserver_user }}"
    mode: '0644'
  tags: signature_xpi

- name: Remove XPI build directory
  ansible.builtin.file:
    path: "{{ xpi_build_dir.path }}"
    state: absent
  tags: signature_xpi

