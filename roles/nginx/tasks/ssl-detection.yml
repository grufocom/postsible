---
# roles/nginx/tasks/ssl-detection.yml
# Detects which SSL certificates are available per mx_hostname.
# Sets nginx_ssl_status_map: { "mail.example.com": "le" | "selfsigned" | "none" }

- name: Check Let's Encrypt cert for each mx_hostname
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item.mx_hostname }}/fullchain.pem"
  register: _ssl_cert_check
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"

- name: Check pending markers
  ansible.builtin.stat:
    path: "/var/lib/postsible/certs/{{ item.mx_hostname }}.pending"
  register: _ssl_pending_check
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"

- name: Build SSL status map
  ansible.builtin.set_fact:
    nginx_ssl_status_map: >-
      {%- set result = {} -%}
      {%- for i in range(mail_virtual_domains | length) -%}
        {%- set host = mail_virtual_domains[i].mx_hostname -%}
        {%- set cert_ok = _ssl_cert_check.results[i].stat.exists | default(false) -%}
        {%- set pending = _ssl_pending_check.results[i].stat.exists | default(false) -%}
        {%- if cert_ok and not pending -%}
          {%- set _ = result.update({host: 'le'}) -%}
        {%- elif cert_ok and pending -%}
          {%- set _ = result.update({host: 'selfsigned'}) -%}
        {%- else -%}
          {%- set _ = result.update({host: 'none'}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Display SSL status per domain
  ansible.builtin.debug:
    msg: |
      SSL Certificate Status:
      {% for host, status in nginx_ssl_status_map.items() %}
        {{ host }}: {{ status | upper }}
      {% endfor %}
