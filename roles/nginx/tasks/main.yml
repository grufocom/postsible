---
# roles/nginx/tasks/main.yml

# ── Package installation (unchanged) ─────────────────────────────────────────

- name: Ensure dpkg is in a clean state
  ansible.builtin.command: dpkg --configure -a
  changed_when: false
  failed_when: false

- name: Detect available PHP version
  ansible.builtin.shell: |
    apt-cache search php-fpm | grep -oP 'php\K[0-9]+\.[0-9]+' | sort -V | tail -1
  register: detected_php_version
  changed_when: false
  tags: nginx

- name: Set PHP version fact
  ansible.builtin.set_fact:
    nginx_php_version: "{{ detected_php_version.stdout | default('8.2') }}"
  tags: nginx

- name: Install nginx and PHP packages
  ansible.builtin.apt:
    name:
      - nginx-common
      - libnginx-mod-http-dav-ext
      - nginx
      - "php{{ nginx_php_version }}-fpm"
      - "php{{ nginx_php_version }}-cli"
      - "php{{ nginx_php_version }}-mysql"
      - "php{{ nginx_php_version }}-curl"
      - "php{{ nginx_php_version }}-gd"
      - "php{{ nginx_php_version }}-mbstring"
      - "php{{ nginx_php_version }}-xml"
      - "php{{ nginx_php_version }}-zip"
      - "php{{ nginx_php_version }}-intl"
      - "php{{ nginx_php_version }}-bcmath"
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
  tags: nginx

- name: Enable PHP extensions
  ansible.builtin.command: "phpenmod -v {{ nginx_php_version }} {{ item }}"
  loop: [mbstring, curl, gd, intl, mysql, opcache, xml, zip, bcmath]
  changed_when: false
  failed_when: false
  tags: nginx

# ── nginx.conf ────────────────────────────────────────────────────────────────

- name: Configure nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
  notify: reload nginx
  tags: nginx

- name: Configure PHP-FPM pool
  ansible.builtin.template:
    src: php-fpm-pool.conf.j2
    dest: "/etc/php/{{ nginx_php_version }}/fpm/pool.d/www.conf"
    owner: root
    group: root
    mode: '0644'
  notify: restart php-fpm
  tags: nginx

# ── Remove legacy rspamd vhost ────────────────────────────────────────────────

- name: Remove legacy 'rspamd' vhost symlink (replaced by per-domain vhosts)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/rspamd
    - /etc/nginx/sites-available/rspamd
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-available/default
  notify: reload nginx
  tags: nginx

# ── Web root + default page ───────────────────────────────────────────────────

- name: Create web directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0755'
  loop:
    - /var/www
    - /var/www/html
    - /var/www/certbot
  tags: nginx

- name: Create default index.html (Steampunk Standby Page)
  ansible.builtin.copy:
    dest: /var/www/html/index.html
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0644'
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="robots" content="noindex, nofollow">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ChronoEngine Node-12B</title>
        <style>
          body { margin:0; padding:0; background:#1b1b1b; color:#d2b48c;
                 font-family:'Courier New',monospace; display:flex;
                 align-items:center; justify-content:center; height:100vh;
                 background-image:radial-gradient(#2e2e2e 1px,transparent 1px);
                 background-size:40px 40px; }
          .container { text-align:center; max-width:600px; }
          h1 { font-size:2.5em; color:#e0c097; text-shadow:1px 1px 0 #000; }
          p  { font-size:1.1em; color:#c0a080; margin-top:1em; line-height:1.4; }
          .gear { font-size:2em; animation:rotate 10s linear infinite;
                  display:inline-block; color:#a67c52; }
          @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        </style>
      </head>
      <body>
        <div class="container">
          <div class="gear">⚙️</div>
          <h1>Node-12B: Standby Mode</h1>
          <p>Temporal interface offline.<br>Maintenance cycle in progress.</p>
          <p><em>"Even the oldest gears must sometimes rest."</em></p>
        </div>
      </body>
      </html>
  tags: nginx

# ── Per-domain vhosts ─────────────────────────────────────────────────────────

# roles/nginx/tasks/main.yml (Auszug für SSL-Zertifikate und VHosts)

- name: Ensure SSL cert directory exists per domain (pre-certbot)
  ansible.builtin.file:
    path: "/etc/letsencrypt/live/{{ item.mx_hostname }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: '0750'
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  tags: nginx

- name: Deploy self-signed certificate generation script
  ansible.builtin.template:
    src: generate-selfsigned.sh.j2
    dest: /usr/local/bin/postsible-generate-selfsigned
    owner: root
    group: root
    mode: '0750'
  tags: nginx

- name: Generate self-signed cert for domains without LE cert yet
  ansible.builtin.command: >
    /usr/local/bin/postsible-generate-selfsigned {{ item.mx_hostname }}
  args:
    creates: "/etc/letsencrypt/live/{{ item.mx_hostname }}/fullchain.pem"
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  tags: nginx

- name: Check if Let's Encrypt certificates exist
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item.mx_hostname }}/fullchain.pem"
  register: le_cert_check
  loop: "{{ mail_virtual_domains }}"
  tags: nginx

- name: Set fact for domains with Let's Encrypt certificates
  ansible.builtin.set_fact:
    domains_with_le_certs: >-
      {{
        le_cert_check.results
        | selectattr('stat.exists', 'equalto', true)
        | map(attribute='item')
        | map(attribute='mx_hostname')
        | list
      }}
  tags: nginx

- name: Display SSL certificate status per domain
  ansible.builtin.debug:
    msg: |
      ========================================
      SSL Certificate Status for {{ item.mx_hostname }}
      ========================================
      {% if item.mx_hostname in domains_with_le_certs %}
      ✓ Let's Encrypt certificate exists
      {% else %}
      ⚠️  Self-signed certificate (Let's Encrypt not yet available)
      {% endif %}
      Certificate path: /etc/letsencrypt/live/{{ item.mx_hostname }}/
      ========================================
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  tags: nginx

- name: Deploy nginx vhost per mx_hostname
  ansible.builtin.template:
    src: mailserver-vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.mx_hostname }}.conf"
    owner: root
    group: root
    mode: '0644'
  vars:
    vdomain: "{{ item }}"
    has_le_cert: "{{ item.mx_hostname in domains_with_le_certs }}"
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  notify: reload nginx
  tags: nginx

- name: Enable nginx vhost per mx_hostname
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.mx_hostname }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.mx_hostname }}.conf"
    state: link
  loop: "{{ mail_virtual_domains }}"
  loop_control:
    label: "{{ item.mx_hostname }}"
  notify: reload nginx
  tags: nginx

# ── Start services ────────────────────────────────────────────────────────────

- name: Test nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  register: nginx_test
  failed_when: nginx_test.rc != 0
  tags: nginx

- name: Enable and start PHP-FPM
  ansible.builtin.systemd:
    name: "php{{ nginx_php_version }}-fpm"
    enabled: yes
    state: started
  tags: nginx

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: yes
    state: started
  tags: nginx

- name: Display nginx summary
  ansible.builtin.debug:
    msg: |
      Nginx configured for {{ mail_virtual_domains | length }} domain(s):
      {% for d in mail_virtual_domains %}
        • https://{{ d.mx_hostname }}/wm/       (Webmail)
        • https://{{ d.mx_hostname }}/rspamd/   (Rspamd WebUI)
      {% endfor %}
      PHP version: {{ nginx_php_version }}
  tags: nginx

